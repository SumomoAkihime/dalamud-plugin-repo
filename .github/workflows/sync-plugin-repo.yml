name: Sync Dalamud Plugin Repo

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/sync-plugin-repo.yml'
      - 'tools/Build-DalamudRepo.ps1'
      - 'repo-config.json'

permissions:
  actions: read
  contents: write

jobs:
  sync:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone source repositories
        shell: pwsh
        run: |
          $sourcesRoot = Join-Path $env:GITHUB_WORKSPACE '_sources'
          if (Test-Path $sourcesRoot) { Remove-Item $sourcesRoot -Recurse -Force }
          New-Item -ItemType Directory -Path $sourcesRoot -Force | Out-Null

          git clone --depth 1 https://github.com/SumomoAkihime/ffxiv-characterstatus-refined.git (Join-Path $sourcesRoot 'ffxiv-characterstatus-refined')
          git clone --depth 1 --branch test2 https://github.com/SumomoAkihime/ffxiv_bossmod.git (Join-Path $sourcesRoot 'ffxiv_bossmod')
          git clone --depth 1 https://github.com/SumomoAkihime/ReMakePalce.git (Join-Path $sourcesRoot 'ReMakePalce')
          git clone --depth 1 --recurse-submodules https://github.com/SumomoAkihime/Ices-Cosmic-Exploration.git (Join-Path $sourcesRoot 'Ices-Cosmic-Exploration')

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud SDK payload
        shell: pwsh
        run: |
          $dalamudHome = Join-Path $env:RUNNER_TEMP 'dalamud'
          Invoke-WebRequest 'https://goatcorp.github.io/dalamud-distrib/latest.zip' -OutFile "$dalamudHome.zip"
          Expand-Archive "$dalamudHome.zip" -DestinationPath $dalamudHome -Force
          "DALAMUD_HOME=$dalamudHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build BossMod package
        shell: pwsh
        run: |
          Push-Location (Join-Path $env:GITHUB_WORKSPACE '_sources\ffxiv_bossmod')
          dotnet build .\BossMod\BossMod.csproj -c Release
          Pop-Location

      - name: Build ReMakePlace package
        shell: pwsh
        run: |
          $repoRoot = Join-Path $env:GITHUB_WORKSPACE '_sources\ReMakePalce'
          Push-Location $repoRoot
          dotnet build .\ReMakePlacePlugin.sln -c Release
          $srcZip = Join-Path $repoRoot 'bin\ReMakePlacePlugin\latest.zip'
          if (-not (Test-Path $srcZip)) { throw 'ReMakePlace latest.zip not found after build.' }
          $dstDir = Join-Path $repoRoot 'release\ReMakePlacePlugin'
          New-Item -ItemType Directory -Path $dstDir -Force | Out-Null
          Copy-Item $srcZip (Join-Path $dstDir 'latest.zip') -Force
          Pop-Location

      - name: Build ICE package
        shell: pwsh
        run: |
          $repoRoot = Join-Path $env:GITHUB_WORKSPACE '_sources\Ices-Cosmic-Exploration'
          Push-Location $repoRoot
          dotnet build .\ICE\ICE.csproj -c Release
          $srcZip = Join-Path $repoRoot 'ICE\bin\Release\ICECN\latest.zip'
          if (-not (Test-Path $srcZip)) { throw 'ICE latest.zip not found after build.' }
          $dstDir = Join-Path $repoRoot 'release\ICECN'
          New-Item -ItemType Directory -Path $dstDir -Force | Out-Null
          Copy-Item $srcZip (Join-Path $dstDir 'latest.zip') -Force
          Pop-Location

      - name: Build aggregated repo
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\tools\Build-DalamudRepo.ps1 `
            -BaseUrl "https://raw.githubusercontent.com/SumomoAkihime/dalamud-plugin-repo/master/plugin-repo" `
            -SourceRoot (Join-Path $env:GITHUB_WORKSPACE '_sources') `
            -OutputRoot (Join-Path $env:GITHUB_WORKSPACE 'plugin-repo') `
            -ConfigPath (Join-Path $env:GITHUB_WORKSPACE 'repo-config.json')

      - name: Commit updated repo contents
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add plugin-repo

          if (git diff --cached --quiet) {
            Write-Host 'No plugin repo changes detected.'
            exit 0
          }

          git commit -m "自动同步插件源"
          git push

